# Full RQ1 matrix, replication 1 (Phase F).
#
# 4 P4 programs × 3 packet sizes × 3 carrier loads = 36 configs,
# plus one cold-idle reference (l3_lpm, 256 B, 0 Mbps, no carrier).
# 1000 probes per config (~60 s probe burst at 60 ms interval).
# Continuous-carrier methodology: background traffic at the
# configured rate runs throughout warmup + measurement.
#
# Wall-clock estimate: 37 configs × (30 s warmup + 60 s probe +
# 3 s drain + 30 s cooldown + ~5 s setup) ≈ 75 minutes.
campaign:
  name: rq1_full_rep1
  seed: 42
  warmup_seconds: 30
  cooldown_seconds: 30
configs:
- rq: 1
  workload_type: latency_l2
  p4_program: l2_forward
  packet_size_bytes: 64
  background_load_mbps: 1
  n_probes: 1000
  repetitions: 1
  probe_interval_ms: 60.0
