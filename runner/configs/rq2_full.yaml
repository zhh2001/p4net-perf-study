# Full RQ2 matrix, replication 1 (Phase F).
#
# 42 configs × 10 reps = 420 runs.
# Variables: N ∈ {1,2,4,8}, K ∈ {10,100,1000}, op ∈ {insert,read},
#            mode ∈ {sync,async}; filter: N=1 sync-only (6 configs excluded).
# Shorter warmup/cooldown (5 s each) since RQ2 is gRPC-bound,
# not data-plane-bound.
#
# Wall-clock estimate: 420 runs × ~13 s/run ≈ 90 minutes.
