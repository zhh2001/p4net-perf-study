# Pilot campaign — exercises the full runner pipeline across all four
# research questions.
#
# Phase F methodology: continuous-carrier. Every measurement config
# specifies the background load that runs throughout warmup AND
# measurement (no warmup-then-stop). A single special case —
# ``cold_idle_reference: true`` paired with background_load_mbps: 0 —
# skips the carrier entirely so we keep a cold-baseline data point for
# the paper §5.2 contrast.

campaign:
  name: rq1_rq2_pilot
  seed: 42
  cooldown_seconds: 30
  warmup_seconds: 30

configs:
  # === RQ1 L3 — Phase F grid ===
  # Cold-idle reference: NO carrier, probes only. Used to characterise
  # the cold-path regime (paper §5.2 contrast).
  - rq: 1
    workload_type: latency_l3
    p4_program: l3_lpm
    packet_size_bytes: 256
    background_load_mbps: 0
    cold_idle_reference: true
    n_probes: 100
    repetitions: 1
    probe_interval_ms: 60.0

  # Warm baseline: 1 Mbps continuous carrier keeps caches hot.
  # Replaces Phase D/E's "0 Mbps" config as the canonical comparison
  # point for under-load measurements.
  - rq: 1
    workload_type: latency_l3
    p4_program: l3_lpm
    packet_size_bytes: 256
    background_load_mbps: 1
    n_probes: 100
    repetitions: 1
    probe_interval_ms: 60.0

  # MID load (~0.5 × R_max from saturation sweep).
  - rq: 1
    workload_type: latency_l3
    p4_program: l3_lpm
    packet_size_bytes: 256
    background_load_mbps: 25
    n_probes: 100
    repetitions: 1
    probe_interval_ms: 60.0

  # HIGH load (~0.9 × R_max, near-saturation).
  - rq: 1
    workload_type: latency_l3
    p4_program: l3_lpm
    packet_size_bytes: 256
    background_load_mbps: 45
    n_probes: 100
    repetitions: 1
    probe_interval_ms: 60.0

  # === RQ1 L2 — cold-idle reference for l2_forward.p4 ===
  - rq: 1
    workload_type: latency_l2
    p4_program: l2_forward
    packet_size_bytes: 256
    background_load_mbps: 0
    cold_idle_reference: true
    n_probes: 100
    repetitions: 1
    probe_interval_ms: 60.0

  # === RQ2 (Phase C) ===
  - rq: 2
    workload_type: control_plane
    p4_program: l3_lpm
    topology: linear_n
    n_switches: 2
    n_entries_per_switch: 100
    operation: insert
    mode: sync
    repetitions: 5

  - rq: 2
    workload_type: control_plane
    p4_program: l3_lpm
    topology: linear_n
    n_switches: 2
    n_entries_per_switch: 100
    operation: insert
    mode: async
    repetitions: 5

  - rq: 2
    workload_type: control_plane
    p4_program: l3_lpm
    topology: linear_n
    n_switches: 2
    n_entries_per_switch: 100
    operation: read
    mode: sync
    repetitions: 5

  - rq: 2
    workload_type: control_plane
    p4_program: l3_lpm
    topology: linear_n
    n_switches: 2
    n_entries_per_switch: 100
    operation: read
    mode: async
    repetitions: 5

  # === RQ3 (Phase E) — now with continuous carrier per config ===
  - rq: 3
    workload_type: int_multihop
    p4_program: l3_lpm_int_chain
    topology: linear_n
    n_switches: 2
    background_load_mbps: 0
    cold_idle_reference: true
    n_probes: 100
    repetitions: 1
    probe_interval_ms: 60.0
    packet_size_bytes: 256

  - rq: 3
    workload_type: int_multihop
    p4_program: l3_lpm_int_chain
    topology: linear_n
    n_switches: 2
    background_load_mbps: 25
    n_probes: 100
    repetitions: 1
    probe_interval_ms: 60.0
    packet_size_bytes: 256

  - rq: 3
    workload_type: int_multihop
    p4_program: l3_lpm_int_chain
    topology: linear_n
    n_switches: 3
    background_load_mbps: 0
    cold_idle_reference: true
    n_probes: 100
    repetitions: 1
    probe_interval_ms: 60.0
    packet_size_bytes: 256

  # === RQ4 (Phase D) ===
  - rq: 4
    workload_type: resource_only
    p4_program: l3_lpm
    topology: single_switch
    n_switches: 1
    background_load_mbps: 0
    cold_idle_reference: true
    duration_s: 60
    repetitions: 1

  - rq: 4
    workload_type: resource_only
    p4_program: l3_lpm
    topology: linear_n
    n_switches: 4
    background_load_mbps: 25
    duration_s: 60
    repetitions: 1
