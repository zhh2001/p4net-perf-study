# Pilot campaign — exercises the full runner pipeline across both
# research questions covered by Phase C.
#
# Layout:
#
#   RQ1 latency (3 configs, 1 rep each)
#     - l3_lpm  @ 256B / 0   Mbps background  (Phase B baseline)
#     - l3_lpm  @ 256B / 100 Mbps background  (Phase B baseline)
#     - l2_forward @ 256B / 0 Mbps background (new in Phase C — L2 probe)
#
#   RQ2 control-plane (4 configs, 5 reps each)
#     - linear_n N=2, K=100 inserts, sync
#     - linear_n N=2, K=100 inserts, async
#     - linear_n N=2, K=100 reads,   sync
#     - linear_n N=2, K=100 reads,   async
#
# Total: 7 configs / 23 measurement records. Estimated wall-clock
# ~15 minutes including per-rep network bring-up + 30s cooldown after
# each repetition.

campaign:
  name: rq1_rq2_pilot
  seed: 42
  cooldown_seconds: 30
  warmup_seconds: 30
  warmup_rate_mbps: 1  # unified warmup load (Phase E methodology fix)

configs:
  # === RQ1 L3 (Phase B baseline) ===
  - rq: 1
    workload_type: latency_l3
    p4_program: l3_lpm
    packet_size_bytes: 256
    background_load_mbps: 0
    n_probes: 100
    repetitions: 1
    probe_interval_ms: 60.0

  # MID load (~0.5 × R_max from saturation sweep)
  - rq: 1
    workload_type: latency_l3
    p4_program: l3_lpm
    packet_size_bytes: 256
    background_load_mbps: 25
    n_probes: 100
    repetitions: 1
    probe_interval_ms: 60.0

  # HIGH load (~0.9 × R_max, near-saturation but still <5% probe loss)
  - rq: 1
    workload_type: latency_l3
    p4_program: l3_lpm
    packet_size_bytes: 256
    background_load_mbps: 45
    n_probes: 100
    repetitions: 1
    probe_interval_ms: 60.0

  # === RQ1 L2 (new in Phase C) ===
  - rq: 1
    workload_type: latency_l2
    p4_program: l2_forward
    packet_size_bytes: 256
    background_load_mbps: 0
    n_probes: 100
    repetitions: 1
    probe_interval_ms: 60.0

  # === RQ2 (new in Phase C) ===
  - rq: 2
    workload_type: control_plane
    p4_program: l3_lpm
    topology: linear_n
    n_switches: 2
    n_entries_per_switch: 100
    operation: insert
    mode: sync
    repetitions: 5

  - rq: 2
    workload_type: control_plane
    p4_program: l3_lpm
    topology: linear_n
    n_switches: 2
    n_entries_per_switch: 100
    operation: insert
    mode: async
    repetitions: 5

  - rq: 2
    workload_type: control_plane
    p4_program: l3_lpm
    topology: linear_n
    n_switches: 2
    n_entries_per_switch: 100
    operation: read
    mode: sync
    repetitions: 5

  - rq: 2
    workload_type: control_plane
    p4_program: l3_lpm
    topology: linear_n
    n_switches: 2
    n_entries_per_switch: 100
    operation: read
    mode: async
    repetitions: 5

  # === RQ4 (new in Phase D) ===
  # Idle baseline: single switch, no background load. Characterises
  # BMv2 steady-state cost just for being alive (event loop, gRPC
  # idle, JSON-loaded pipeline) before any traffic hits it.
  - rq: 4
    workload_type: resource_only
    p4_program: l3_lpm
    topology: single_switch
    n_switches: 1
    background_load_mbps: 0
    duration_s: 60
    repetitions: 1

  # Loaded multi-switch: linear-N=4 carrying MID-rate background
  # traffic end-to-end. Surfaces how BMv2 CPU/RSS/throughput scale
  # with chain length under a known-sustainable load.
  - rq: 4
    workload_type: resource_only
    p4_program: l3_lpm
    topology: linear_n
    n_switches: 4
    background_load_mbps: 25
    duration_s: 60
    repetitions: 1
